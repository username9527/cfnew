name: Generate and Obfuscate Worker Script

on:
  workflow_dispatch:
  push:
    branches:
      - '**'  # 仅匹配分支推送，排除标签推送
    paths:
      - 'cfnew.js'
      - 'edgetunnel.js'

# 添加写入权限，解决 git push 报错 exit code 128
permissions:
  contents: write

jobs:
  build-and-obfuscate:
    runs-on: ubuntu-latest

    steps:
      # 升级 Action 版本至 v6，消除 Node.js 20 弃用警告
      - name: Checkout repository
        uses: actions/checkout@v6

      # 升级 Action 版本至 v6，消除 Node.js 20 弃用警告
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Install Obfuscator
        run: npm install javascript-obfuscator

      - name: Obfuscate from local source files
        run: |
          cat > obfuscate.js << 'EOF'
          const JavaScriptObfuscator = require('javascript-obfuscator');
          const fs = require('fs');
          const path = require('path');
          
          // 定义多文件映射关系
          const filesToProcess = [
            { source: 'cfnew.js', output: 'cfnew_worker.js' },
            { source: 'edgetunnel.js', output: 'edgetunnel_worker.js' },
            { source: 'snippets.js', output: 'snippets_worker.js' }
          ];

          const obfuscationOptions = {
              compact: true,
              controlFlowFlattening: false,
              controlFlowFlatteningThreshold: 0,
              deadCodeInjection: false,
              stringArray: true,
              stringArrayEncoding: ['base64'],
              stringArrayThreshold: 1.0,
              stringArrayRotate: true,
              stringArrayShuffle: true,
              stringArrayWrappersCount: 2,
              stringArrayWrappersChainedCalls: false,
              stringArrayWrappersParametersMaxCount: 3,
              renameGlobals: true,
              identifierNamesGenerator: 'mangled-shuffled',
              identifierNamesCache: null,
              identifiersPrefix: '',
              renameProperties: false,
              renamePropertiesMode: 'safe',
              ignoreImports: false,
              target: 'browser',
              numbersToExpressions: false,
              simplify: false,
              splitStrings: true,
              splitStringsChunkLength: 1,
              transformObjectKeys: false,
              unicodeEscapeSequence: true,
              selfDefending: false,
              debugProtection: false,
              debugProtectionInterval: 0,
              disableConsoleOutput: true,
              domainLock: []
          };

          filesToProcess.forEach(file => {
            const sourceFilePath = path.join(process.cwd(), file.source);

            if (!fs.existsSync(sourceFilePath)) {
              console.error('错误：在路径 \'' + sourceFilePath + '\' 未找到源文件。请确保您的仓库根目录有名为 \'' + file.source + '\' 的文件。');
              process.exit(1);
            }

            const originalCode = fs.readFileSync(sourceFilePath, 'utf8');

            if (!originalCode || originalCode.trim().length === 0) {
              console.error('错误：源文件 ' + file.source + ' 为空。');
              process.exit(1);
            }

            const obfuscatedCode = JavaScriptObfuscator.obfuscate(originalCode, obfuscationOptions).getObfuscatedCode();
            
            fs.writeFileSync(path.join(process.cwd(), file.output), obfuscatedCode, 'utf8');
            console.log('成功将 \'' + file.source + '\' 混淆并保存至 \'' + file.output + '\'。');
          });
          EOF
          node obfuscate.js

      - name: Commit and push the obfuscated files
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions[bot]@github.com'
          git add 'cfnew_worker.js' 'edgetunnel_worker.js'
          if git diff --staged --quiet; then
            echo "No changes to commit, the obfuscated files are already up-to-date."
          else
            git commit -m "部署用这个"
            git push
          fi
